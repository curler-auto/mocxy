<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mocxy</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../icons/icon-32.png" alt="" width="22" height="22">
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">Mocxy</span>
        <span class="sidebar-brand-sub">devtools</span>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">

      <button class="nav-item active" data-section="rules">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span class="nav-label">Rules</span>
      </button>

      <button class="nav-item" data-section="mocks">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span class="nav-label">Mock Collections</span>
      </button>

      <button class="nav-item" data-section="logs">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="nav-label">Request Log</span>
      </button>

      <div class="nav-divider"></div>

      <button class="nav-item" data-section="import-export">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/><polyline points="8 7 3 12 8 17"/>
        </svg>
        <span class="nav-label">Import / Export</span>
      </button>

      <button class="nav-item" data-section="settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </button>

    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-version" id="versionLabel">v1.0.0</span>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-pane">

    <!-- Header bar -->
    <header class="header-bar">
      <div class="header-title-group">
        <h1 class="header-title">Mocxy</h1>
        <span class="header-badge" id="headerVersion">v1.0.0</span>
      </div>
      <div class="header-controls">
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle light/dark theme">
          <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <span class="header-status-label" id="statusLabel">Enabled</span>
        <label class="toggle" id="masterToggle">
          <input type="checkbox" id="toggleInput" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <!-- Content sections -->
    <div class="content-area" id="contentArea">

      <!-- Rules -->
      <section class="content-section active" id="section-rules">
        <div class="section-header">
          <h2 class="section-title">Interception Rules</h2>
          <div class="section-actions">
            <button class="btn btn-primary" id="addRuleBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add Rule
            </button>
          </div>
        </div>
        <div class="section-body">
          <div id="ruleListContainer"></div>
          <div id="ruleFormContainer" class="hidden"></div>
        </div>
      </section>

      <!-- Mocks — full height, no padding (editor manages its own layout) -->
      <section class="content-section content-section--full" id="section-mocks">
        <div id="mockEditorContainer" style="display:flex;flex-direction:column;height:100%"></div>
      </section>

      <!-- Logs -->
      <section class="content-section" id="section-logs">
        <div class="section-header">
          <h2 class="section-title">Request Log</h2>
        </div>
        <div class="section-body">
          <div id="requestLogContainer"></div>
        </div>
      </section>

      <!-- Import / Export -->
      <section class="content-section" id="section-import-export">
        <div class="section-header">
          <h2 class="section-title">Import / Export</h2>
        </div>
        <div class="section-body">
          <div id="importExportContainer"></div>
        </div>
      </section>

      <!-- Settings -->
      <section class="content-section" id="section-settings">
        <div class="section-header">
          <h2 class="section-title">Settings</h2>
        </div>
        <div class="section-body">
          <div id="settingsPanelContainer"></div>
        </div>
      </section>

    </div>
  </div>

  <!-- Shared modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle"></h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
